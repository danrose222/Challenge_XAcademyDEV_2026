<div style="max-width: 600px; margin: 40px auto; text-align: center; font-family: sans-serif;">
  
  @if (playerData) {
    <h2>Detalles de: {{ playerData.name }}</h2>
    <p>Club: {{ playerData.club }} | Posición: {{ playerData.position }}</p>
  } @else {
    <h2>Cargando detalles del jugador #{{ playerId }}...</h2>
  }

  <div style="display: block; margin-top: 30px;">
    <canvas baseChart
      [data]="radarChartData"
      [options]="radarChartOptions"
      [type]="radarChartType">
    </canvas>
  </div>

  <button routerLink="/" style="margin-top: 40px; padding: 10px 20px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer;">
    ⬅ Volver al listado
  </button>
</div>
